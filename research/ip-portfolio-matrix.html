<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech 4 Humanity - IP Portfolio Prioritization Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover, button:hover {
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            font-weight: 600;
        }

        button:hover {
            background: #764ba2;
        }

        .ip-grid {
            display: grid;
            gap: 20px;
        }

        .ip-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .ip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .ip-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .ip-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2d3748;
            flex: 1;
        }

        .priority-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-critical { background: #fc8181; color: white; }
        .priority-high { background: #f6ad55; color: white; }
        .priority-medium { background: #f6e05e; color: #2d3748; }
        .priority-low { background: #68d391; color: white; }

        .ip-type {
            display: inline-block;
            padding: 4px 12px;
            background: #edf2f7;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .ip-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .metric {
            text-align: center;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .metric-label {
            font-size: 0.75rem;
            color: #718096;
            text-transform: uppercase;
        }

        .ip-description {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .score-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .expanded-details {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .ip-card.expanded .expanded-details {
            display: block;
        }

        .detail-section {
            margin-bottom: 15px;
        }

        .detail-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .detail-list {
            padding-left: 20px;
        }

        .detail-list li {
            margin-bottom: 5px;
            color: #4a5568;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; }
            .ip-metrics { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

            <div class="filter-group">

            </div>

            <div class="filter-group">

                    <option value="score">Total Score</option>
                    <option value="revenue">Revenue Potential</option>
                    <option value="feasibility">Feasibility</option>
                    <option value="strategic">Strategic Value</option>

            <button id="exportBtn">📥 Export CSV</button>

        // Calculate composite scores
        innovations.forEach(inn => {
            inn.totalScore = (inn.revenueValue * 0.4) + (inn.feasibility * 0.3) + (inn.strategic * 0.3);
        });

        function renderInnovations(filtered = innovations) {
            const grid = document.getElementById('ipGrid');
            grid.innerHTML = '';

            filtered.forEach(inn => {
                const card = document.createElement('div');
                card.className = 'ip-card';
                card.onclick = () => card.classList.toggle('expanded');
                
                const types = inn.type.map(t => `<span class="ip-type">${t}</span>`).join('');
                
                card.innerHTML = `
                    <div class="ip-header">
                        <div class="ip-title">${inn.name}</div>
                        <span class="priority-badge priority-${inn.priority}">${inn.priority}</span>
                    </div>
                    <div>${types}</div>
                    <p class="ip-description">${inn.description}</p>
                    
                    <div class="ip-metrics">

                        </div>

                        <div class="metric">

                    </div>

                        </div>
                        <div class="detail-section">
                            <div class="detail-title">Competitive Advantage</div>
                            <ul class="detail-list">
                                ${inn.details.competitiveAdvantage.map(a => `<li>${a}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="detail-section">

                            <ul class="detail-list">

                            </ul>

                grid.appendChild(card);

        }

        function applyFilters() {
            const typeFilter = document.getElementById('typeFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;
            const sortBy = document.getElementById('sortBy').value;

            let filtered = innovations.filter(inn => {
                const typeMatch = typeFilter === 'all' || inn.type.includes(typeFilter);
                let priorityMatch = true;
                
                if (priorityFilter === 'critical') priorityMatch = inn.priority === 'critical';
                else if (priorityFilter === 'high') priorityMatch = ['critical', 'high'].includes(inn.priority);
                else if (priorityFilter === 'medium') priorityMatch = ['critical', 'high', 'medium'].includes(inn.priority);

                return typeMatch && priorityMatch;
            });

            // Sort
            filtered.sort((a, b) => {
                if (sortBy === 'revenue') return b.revenueValue - a.revenueValue;
                if (sortBy === 'feasibility') return b.feasibility - a.feasibility;
                if (sortBy === 'strategic') return b.strategic - a.strategic;
                return b.totalScore - a.totalScore;
            });

            renderInnovations(filtered);
            
            // Update stats
            document.getElementById('totalInnovations').textContent = filtered.length;
            document.getElementById('criticalPriority').textContent = 
                filtered.filter(i => i.priority === 'critical').length;
        }

        function exportCSV() {
            const headers = ['Rank', 'Innovation', 'Type', 'Priority', 'Total Score', 'Revenue', 'Feasibility', 'Strategic', 'Market Ready', 'Time to Market'];
            const rows = innovations.map((inn, idx) => [
                idx + 1,
                inn.name,
                inn.type.join('; '),
                inn.priority,
                Math.round(inn.totalScore),
                inn.revenue,
                inn.feasibility,
                inn.strategic,
                inn.marketReady ? 'Yes' : 'No',
                inn.timeToMarket
            ]);

            const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tech4humanity_ip_portfolio.csv';
            a.click();
        }

        // Event listeners
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('priorityFilter').addEventListener('change', applyFilters);
        document.getElementById('sortBy').addEventListener('change', applyFilters);
        document.getElementById('exportBtn').addEventListener('click', exportCSV);

        // Initial render
        renderInnovations();

</body>
