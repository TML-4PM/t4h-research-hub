name: Bridge Runner - Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bridge-runner-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Write heartbeat
        run: |
          mkdir -p bridge/receipts
          cat > bridge/receipts/runner-heartbeat.json <<EOF
          {
            "type": "heartbeat",
            "runner": "github-actions",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repo": "TML-4PM/t4h-research-hub",
            "status": "ALIVE",
            "commit_sha": "${{ github.sha }}"
          }
          EOF

      - name: Commit and push (rebase-safe)
        run: |
          git config user.name "bridge-runner[bot]"
          git config user.email "bridge-runner@tml-4pm"
          git add bridge/receipts/runner-heartbeat.json
          if git diff --staged --quiet; then
            echo "::notice::No changes to commit"
            exit 0
          fi
          git commit -m "chore: runner heartbeat [skip ci] $(date -u +%Y%m%dT%H%M%S)"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "::notice::Heartbeat pushed (attempt $attempt)"
              exit 0
            fi
            echo "::warning::Push attempt $attempt failed; retrying"
            sleep 5
          done
          echo "::error::All push attempts failed"
          exit 1
