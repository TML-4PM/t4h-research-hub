name: Bridge Runner — Payload Executor

on:
  push:
    paths:
      - 'bridge/payloads/**.json'
  workflow_dispatch:
    inputs:
      payload_path:
        description: 'Specific payload file to run (optional)'
        required: false

permissions:
  contents: write

jobs:
  bridge-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed payloads
        id: detect
        env:
          INPUT_PATH: ${{ github.event.inputs.payload_path }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_PATH:-}" ]; then
            echo "files=${INPUT_PATH}" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'bridge/payloads/*.json' | tr '\n' ' ')
            echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"
          fi

      - name: Execute payloads
        env:
          BRIDGE_ENDPOINT: ${{ secrets.BRIDGE_ENDPOINT }}
          BRIDGE_API_KEY: ${{ secrets.BRIDGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          FILES="${{ steps.detect.outputs.files }}"
          if [ -z "${FILES// }" ]; then
            echo "No payload files changed — nothing to execute"
            exit 0
          fi

          for PAYLOAD_PATH in $FILES; do
            echo "=== Processing: $PAYLOAD_PATH ==="
            if [ ! -f "$PAYLOAD_PATH" ]; then
              echo "File not found: $PAYLOAD_PATH — skipping"
              continue
            fi

            REQUEST_ID=$(node -e "const j=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')); console.log(j.metadata?.request_id || j.request_id || 'unknown-'+Date.now())" "$PAYLOAD_PATH")
            FUNCTION_NAME=$(node -e "const j=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')); console.log(j.function_name || j.action || 'unknown')" "$PAYLOAD_PATH")

            echo "request_id=$REQUEST_ID function=$FUNCTION_NAME"

            mkdir -p bridge/receipts
            RECEIPT_FILE="bridge/receipts/${REQUEST_ID}.receipt.json"
            PICKED_UP_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            INVOKE_STATUS="SKIPPED"
            INVOKE_RESPONSE='{}'
            HTTP_CODE=0

            if [ -n "${BRIDGE_ENDPOINT:-}" ] && [ -n "${BRIDGE_API_KEY:-}" ]; then
              HTTP_RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$BRIDGE_ENDPOINT" \
                -H 'Content-Type: application/json' \
                -H "x-api-key: $BRIDGE_API_KEY" \
                -d @"$PAYLOAD_PATH" --max-time 30 || printf '{"error":"curl_failed"}\n000')
              HTTP_CODE=$(printf '%s' "$HTTP_RESPONSE" | tail -n1)
              INVOKE_RESPONSE=$(printf '%s' "$HTTP_RESPONSE" | sed '$d')
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                INVOKE_STATUS="REAL"
              else
                INVOKE_STATUS="PARTIAL"
              fi
            else
              INVOKE_STATUS="BLOCKED"
              INVOKE_RESPONSE='{"error":"BRIDGE_ENDPOINT or BRIDGE_API_KEY not configured","fix":"Add secrets at Settings > Secrets > Actions"}'
            fi

            COMPLETED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            node -e "
              const fs=require('fs');
              const receipt={
                request_id: process.env.REQUEST_ID,
                function_name: process.env.FUNCTION_NAME,
                payload_path: process.env.PAYLOAD_PATH,
                commit_sha: process.env.GH_SHA,
                runner_workflow: process.env.GH_RUN_ID,
                picked_up_at: process.env.PICKED_UP_AT,
                completed_at: process.env.COMPLETED_AT,
                status: process.env.INVOKE_STATUS,
                http_code: Number(process.env.HTTP_CODE),
                response: (()=>{ try { return JSON.parse(process.env.INVOKE_RESPONSE); } catch { return { raw: process.env.INVOKE_RESPONSE }; } })()
              };
              fs.writeFileSync(process.env.RECEIPT_FILE, JSON.stringify(receipt, null, 2));
            "
            echo "Receipt: $RECEIPT_FILE | Status: $INVOKE_STATUS | HTTP: $HTTP_CODE"
          done

      - name: Commit & push receipts
        run: |
          set -euo pipefail
          git config user.name  "bridge-runner[bot]"
          git config user.email "bridge-runner@tml-4pm"
          git add bridge/receipts/ || true
          if git diff --staged --quiet; then
            echo "No receipt changes to commit"
            exit 0
          fi
          TS=$(date -u +%Y%m%d-%H%M%S)
          git commit -m "chore: bridge receipts [skip ci] ${TS}"
          git pull --rebase --autostash origin main || true
          git push
